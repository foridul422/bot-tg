services:
  - type: web
    name: telegram-config-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: MAX_FILE_SIZE
        value: "5242880"
      - key: SPAM_WINDOW_SECONDS
        value: "8"
