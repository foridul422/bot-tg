services:
  - type: web
    name: telegram-config-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: MAX_FILE_SIZE
        value: "5242880"
      - key: SPAM_WINDOW_SECONDS
        value: "8"
      - key: ENABLE_IMPORT_LINKS
        value: "true"
      - key: SHOW_SENSITIVE_FIELDS
        value: "true"
      - key: OWNER_USER_IDS
        value: "5802122865"
      - key: FULL_OUTPUT_CHAT_IDS
        value: ""
